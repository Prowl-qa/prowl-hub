name: Sync to Database

on:
  push:
    branches: [main]
    paths:
      - 'smoke/**/*.yml'
      - 'auth/**/*.yml'
      - 'forms/**/*.yml'
      - 'admin/**/*.yml'
      - 'e-commerce/**/*.yml'
      - 'saas/**/*.yml'
      - 'accessibility/**/*.yml'
      - 'docs/**/*.yml'

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Detect changed and deleted YAML files
        id: changes
        run: |
          DIRS="smoke auth forms admin e-commerce saas accessibility docs"
          PATTERN=""
          for dir in $DIRS; do
            PATTERN="${PATTERN} ${dir}/"
          done

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.event.after }}"
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA")"
          fi

          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- $PATTERN | grep '\.yml$' || true)
          DELETED=$(git diff --name-only --diff-filter=D "$BASE_SHA" "$HEAD_SHA" -- $PATTERN | grep '\.yml$' || true)

          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "deleted<<EOF" >> $GITHUB_OUTPUT
          echo "$DELETED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Import changed files
        if: steps.changes.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHANGED_FILES: ${{ steps.changes.outputs.changed }}
        run: |
          set -e
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Importing: $file"
            ./node_modules/.bin/tsx scripts/import-yaml.ts "$file"
          done <<< "$CHANGED_FILES"

      - name: Delete removed files
        if: steps.changes.outputs.deleted != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DELETED_FILES: ${{ steps.changes.outputs.deleted }}
        run: |
          set -e
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Deleting: $file"
            ./node_modules/.bin/tsx scripts/delete-from-db.ts "$file"
          done <<< "$DELETED_FILES"
