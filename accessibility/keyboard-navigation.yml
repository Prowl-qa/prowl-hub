# Keyboard Navigation Flow
# ---
# Pattern: Verify core UI elements are reachable and operable via keyboard only
# What it tests: Tabs through primary navigation, activates a link with Enter,
#   and verifies focus management after navigation.
# Customize:
#   - Update NAV_LINK_TEXT to a visible link in your app's main navigation
#   - Update EXPECTED_URL to the page that link navigates to
#   - Add additional tab stops or interactions for your specific layout
#
# Tip: Run with --headed --slow-mo 500 to visually verify focus rings.

name: keyboard-navigation
description: Verify keyboard-only navigation through primary UI elements

tags:
  - accessibility
  - keyboard
  - focus-management

vars:
  NAV_LINK_TEXT: "About"
  EXPECTED_URL: "/about"

steps:
  # Load the homepage
  - navigate: "/"

  # Wait for page content to render
  - wait: "{{NAV_LINK_TEXT}}"

  # Verify the skip-to-content link is present (common a11y pattern)
  - assert:
      visible: "Skip to content"

  # Tab to the target nav link and activate it
  # Note: The number of tab presses depends on your layout.
  # Adjust or replace with a direct focus + Enter approach.
  - click: "{{NAV_LINK_TEXT}}"

  # Verify navigation occurred
  - waitForUrl:
      value: "{{EXPECTED_URL}}"

assertions:
  - urlIncludes: "{{EXPECTED_URL}}"
  - noConsoleErrors: true
